# Local development database.
#   docker compose up -d
# Then in .env:
#   DATABASE_URL=postgres://postgres:postgres@localhost:5433/pharmacy?sslmode=disable
services:
  db:
    image: postgres:16-alpine
    container_name: pharmacy-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pharmacy
    ports:
      - "5433:5432"
    volumes:
      - pharmacy_pgdata:/var/lib/postgresql/data

volumes:
  pharmacy_pgdata:
