services:
  - type: web
    name: pharmacare-api
    runtime: go
    plan: free
    region: singapore
    buildCommand: go build -o bin/api ./cmd/api
    startCommand: ./bin/api
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: 8080
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_ACCESS_TTL
        value: 60m
      - key: JWT_REFRESH_TTL
        value: 168h
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # set to your Vercel URL, e.g. https://pharmacare.vercel.app
      - key: BOOTSTRAP_ADMIN_USERNAME
        value: admin
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false          # set a strong password manually
      - key: BOOTSTRAP_ADMIN_NAME
        value: System Administrator
      - key: NEAR_EXPIRY_DAYS
        value: "180"
